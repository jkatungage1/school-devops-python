name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (both services + dev tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -r service_students/requirements.txt
          pip install -r service_courses/requirements.txt
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check service_students service_courses

      - name: Mypy (non-blocking)
        continue-on-error: true
        run: |
          mypy service_students/app || true
          mypy service_courses/app || true

      - name: Test Students service (with coverage)
        working-directory: service_students
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Test Courses service (with coverage)
        working-directory: service_courses
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            service_students/coverage.xml
            service_courses/coverage.xml
          if-no-files-found: warn
