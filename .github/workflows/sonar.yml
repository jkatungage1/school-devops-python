name: SonarCloud

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so SonarCloud can assign issues to the right commits.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (both services + dev tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -r service_students/requirements.txt
          pip install -r service_courses/requirements.txt
          pip install -e ".[dev]"

      - name: Run tests with coverage (writes coverage.xml per service)
        run: |
          (cd service_students && pytest --cov=app --cov-report=xml)
          (cd service_courses  && pytest --cov=app --cov-report=xml)

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
