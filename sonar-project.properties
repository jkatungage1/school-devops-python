# SonarCloud configuration — mirrors the Java devops_demo setup (org jkatungage1).
# NOTE: projectKey/organization must match what you create in SonarCloud.
sonar.projectKey=jkatungage1_school-devops-python
sonar.organization=jkatungage1
sonar.host.url=https://sonarcloud.io

sonar.projectName=School DevOps Python
sonar.python.version=3.12

# Two-service monorepo: analyse both apps and both test suites.
sonar.sources=service_students/app,service_courses/app
sonar.tests=service_students/tests,service_courses/tests

# Coverage — pytest-cov writes coverage.xml in each service dir (see ci.yml / sonar.yml).
sonar.python.coverage.reportPaths=service_students/coverage.xml,service_courses/coverage.xml
